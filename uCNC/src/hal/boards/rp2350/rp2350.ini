##################
# RP2350 Boards #
##################

[common_rp2350]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
platform_packages = framework-arduinopico@https://github.com/earlephilhower/arduino-pico.git
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m
; change microcontroller
board_build.mcu = rp2350
; change MCU frequency
board_build.f_cpu = 150000000L
; lib_deps = adafruit/Adafruit TinyUSB Library@^2.0.3
build_flags = ${env.build_flags} -std=gnu99 -Wall -fdata-sections -ffunction-sections -fno-exceptions -Wl,--gc-sections -DRAM_ONLY_SETTINGS
debug_tool = cmsis-dap
lib_deps = 
    ${env.lib_deps}
		SPI	
		Wire
		EEPROM
lib_ignore = 
		HTTPUpdateServer
		LittleFS
		WiFi
		WebServer
		SerialBT
		DNSServer
		Hash
		BluetoothSerial

[env:RP2350-PICO2]
extends = common_rp2350
board = generic_rp2350
build_flags = ${common_rp2350.build_flags} -D BOARDMAP=\"src/hal/boards/rp2350/boardmap_rpi_pico2.h\"
lib_deps = 
    ${env.lib_deps}
		SPI	
		Wire
		EEPROM

[env:RP2350-CUSTOM]
extends = common_rp2350
build_flags = ${common_rp2350.build_flags} -DMCU=MCU_CUSTOM
board = ${env.board}

[env:RP2350-LEANCAM-MINIMAL]
extends = common_rp2350
board = generic_rp2350
custom_ucnc_modules =
build_flags =
    ${common_rp2350.build_flags}
    -D UCNC_IGNORE_BOARDMAP_OVERRIDES
    -D UCNC_IGNORE_HAL_OVERRIDES
    -D UCNC_MINIMAL_RP2350
    -D MCU=MCU_RP2350
    -D BOARDMAP=\"src/hal/boards/rp2350/boardmap_waveshare_pizero_minimal.h\"
    -D PICO_PIO_USE_GPIO_BASE=1
    -D DISABLE_G7_G8
    -D ENCODERS=0
    -D IC74HC595_COUNT=0
    -D IC74HC165_COUNT=0
    -D RAM_ONLY_SETTINGS
lib_ignore =
    ${common_rp2350.lib_ignore}
    Wire
build_src_filter =
    +<*>
    +<*.ino>
    -<src/hal/mcus/avr/>
    -<src/hal/mcus/esp32/>
    -<src/hal/mcus/esp32c3/>
    -<src/hal/mcus/esp32common/>
    -<src/hal/mcus/esp32s3/>
    -<src/hal/mcus/esp8266/>
    -<src/hal/mcus/lpc176x/>
    -<src/hal/mcus/rp2040/>
    -<src/hal/mcus/samd21/>
    -<src/hal/mcus/stm32f0x/>
    -<src/hal/mcus/stm32f1x/>
    -<src/hal/mcus/stm32f4x/>
    -<src/hal/mcus/stm32h7x/>
    -<src/hal/mcus/virtual/>
    -<src/modules/cam_keyboard/>
    -<src/modules/esp32_pcnt_encoder/>
    -<src/modules/g33/>
    -<src/modules/g33_ELS/>
    -<src/modules/g7_g8/>
    -<src/modules/leanCam/>
    -<src/modules/leancam_rp2350_hdmi/>
    -<src/modules/ra8876_display/>
    -<src/modules/ra8876_test/>
    -<src/modules/sd_card_v2/>
    -<src/modules/ui_snapshot/>
    -<src/modules/_archive_refactor_20260429/>
    -<src/modules/encoder.c>
    -<src/modules/digimstep.c>
    -<src/modules/digipot.c>
    ; Keep excluded for RP2350-LEANCAM-HDMI too. Loading full file_system.c
    ; has twice caused dead HDMI and dead serial during bring-up. The HDMI
    ; target uses leancam_rp2350_sd's small fs_* bridge instead.
    -<src/modules/file_system.c>
    -<src/modules/modbus.c>
    -<src/modules/pid.c>
    -<src/modules/shift_register.c>
    -<src/modules/softi2c.c>
    -<src/modules/softspi.c>
    -<src/modules/softuart.c>
    -<src/modules/system_menu.c>

[env:RP2350-LEANCAM-HDMI]
extends = common_rp2350
board = generic_rp2350
custom_ucnc_modules =
extra_scripts =
    ${env.extra_scripts}
    pre:uCNC/src/modules/leancam_rp2350_hdmi/leancam_disphstx.py
    pre:uCNC/src/modules/leancam_rp2350_sd/leancam_sd_lib.py
build_flags =
    ${env:RP2350-LEANCAM-MINIMAL.build_flags}
    -UUCNC_IGNORE_BOARDMAP_OVERRIDES
    -UUCNC_IGNORE_HAL_OVERRIDES
    -I uCNC/src/modules/leancam_rp2350_hdmi
    -include uCNC/src/modules/leancam_rp2350_hdmi/leancam_hstx_config.h
    -D LEANCAM_USE_HSTX_PLL=0
    -D LEANCAM_USE_PSRAM_FB=0
    -D LEANCAM_USE_PSRAM_BACKBUFFER=1
    -D LEANCAM_USE_PSRAM_LIVE_SIM=1
    -D ENABLE_LEANCAM_RP2350_HDMI
    -D ENABLE_LEANCAM_RP2350_SD
    -D RP2350_DISABLE_ARDUINO_CORE1_LOOP
    -D LEANCAM_RP2350_DIRECT_STREAM
    -D LEANCAM_RP2350_SOFT_CAM_KEYBOARD
    -D CAM_KB_GPIO_SCL=2
    -D CAM_KB_GPIO_SDA=3
    -D PICO_BOARD=\"waveshare_rp2350_pizero\"
lib_deps =
    ${common_rp2350.lib_deps}
lib_ignore =
    ${env:RP2350-LEANCAM-MINIMAL.lib_ignore}
    FatFS
build_src_filter =
    ${env:RP2350-LEANCAM-MINIMAL.build_src_filter}
    +<src/modules/leancam_rp2350_hdmi/>
    +<src/modules/leancam_rp2350_sd/>
    +<src/modules/cam_keyboard/>
    +<src/modules/ui_snapshot/>
    +<src/modules/leanCam/>
    +<src/modules/g7_g8/>
    ; Do not add +<src/modules/file_system.c> here without a staged boot test.
    ; Full file_system.c currently kills both video and serial on this target.
    -<src/modules/leanCam/cam_stream.c>
    -<src/modules/leanCam/leancam_files.c>
    -<src/modules/leanCam/tests/>
    +<src/modules/ra8876_display/ra_leancam_table.c>
